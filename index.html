<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flocking Boids - Cosmic Simulation</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load p5.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
</head>
<body>
    <!-- Cosmic Title -->
    <div class="title-container">
        <h1 class="cosmic-title">FLOCKING BOIDS</h1>
    </div>

    <!-- Canvas will be created by p5.js -->
    <div id="canvas-container"></div>

    <!-- Floating Control Panel -->
    <div class="control-panel">
        <div class="control-group">
            <label for="boidCountSlider">Boid Count</label>
            <input
                type="range"
                id="boidCountSlider"
                min="50"
                max="500"
                step="10"
                value="200"
                class="slider"
            >
            <span id="boidCountValue">200</span>
        </div>

        <div class="control-group">
            <label for="separationSlider">Separation</label>
            <input
                type="range"
                id="separationSlider"
                min="0"
                max="2"
                step="0.1"
                value="1.5"
                class="slider"
            >
            <span id="separationValue">1.50</span>
        </div>

        <div class="control-group">
            <label for="alignmentSlider">Alignment</label>
            <input
                type="range"
                id="alignmentSlider"
                min="0"
                max="2"
                step="0.1"
                value="1.0"
                class="slider"
            >
            <span id="alignmentValue">1.00</span>
        </div>

        <div class="control-group">
            <label for="cohesionSlider">Cohesion</label>
            <input
                type="range"
                id="cohesionSlider"
                min="0"
                max="2"
                step="0.1"
                value="1.0"
                class="slider"
            >
            <span id="cohesionValue">1.00</span>
        </div>
    </div>

    <!-- Load the p5.js sketch -->
    <script src="sketch.js"></script>
</body>
</html>
